version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=Oshadha@2001
      - DB_NAME=booking_db
      - JWT_SECRET=en2h_super_secret_jwt_key
      - JWT_REFRESH_SECRET=en2h_super_secret_refresh_key
      - JWT_EXPIRATION=15m
      - JWT_REFRESH_EXPIRATION=7d
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    restart: always
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Oshadha@2001
      - POSTGRES_DB=booking_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
